name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  OPENAI_API_KEY: sk-test-placeholder-for-ci
  DB_PATH: ./data/test_ci.db
  DEFAULT_CAPITAL: "10000"
  DATA_PERIOD: "2y"
  MAX_REVIEW_ITERATIONS: "3"

jobs:
  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint (pylint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run pylint
        run: |
          uv run pylint src/ \
            --fail-under=7.0 \
            --rcfile=.pylintrc

  # ── Unit tests ─────────────────────────────────────────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        run: |
          uv run pytest tests/ \
            --ignore=tests/integration \
            --tb=short \
            -v \
            --junitxml=reports/unit-results.xml

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: reports/unit-results.xml

  # ── Integration tests ──────────────────────────────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run integration tests
        run: |
          uv run pytest tests/integration/ \
            --tb=short \
            -v \
            --junitxml=reports/integration-results.xml

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: reports/integration-results.xml
