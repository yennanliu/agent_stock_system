<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Quant System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<header>
  <div class="header-inner">
    <span class="logo">⬛ Stock Quant System</span>
    <span class="tagline">AI-powered quantitative strategy generation &amp; backtesting</span>
  </div>
</header>

<main>
  <!-- Search -->
  <section id="search-section">
    <div class="search-box">
      <input id="tickerInput" type="text" placeholder="Enter ticker (e.g. NVDA, AAPL, TSLA)" autocomplete="off" />
      <button id="analyzeBtn">Analyze</button>
    </div>
    <div id="status-log"></div>
  </section>

  <!-- History sidebar -->
  <section id="history-section" hidden>
    <h3>Run History — <span id="historyTicker"></span></h3>
    <table id="history-table">
      <thead><tr><th>Date</th><th>Strategy</th><th>Return</th><th>Sharpe</th><th>Max DD</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>

  <!-- Strategy panel -->
  <section id="strategy-panel" hidden>
    <div class="panel-header">
      <h2 id="strategyName"></h2>
      <div id="reviewBadge"></div>
    </div>
    <p id="strategyExplanation"></p>
    <table id="paramTable" class="param-table"></table>
    <div class="code-header">
      <span>Strategy Source Code</span>
      <button id="runBtn" class="run-btn">▶ Run Again</button>
    </div>
    <pre><code id="sourceCode" class="language-python"></code></pre>
  </section>

  <!-- Backtest panel -->
  <section id="backtest-panel" hidden>
    <h2>Backtest Results</h2>
    <div id="metricsRow" class="metrics-row"></div>

    <div class="charts-grid">
      <div class="chart-card full-width">
        <h4>Equity Curve vs Buy &amp; Hold</h4>
        <canvas id="equityChart"></canvas>
      </div>
      <div class="chart-card">
        <h4>Drawdown</h4>
        <canvas id="drawdownChart"></canvas>
      </div>
      <div class="chart-card">
        <h4>Trade P&amp;L Distribution</h4>
        <canvas id="pnlChart"></canvas>
      </div>
    </div>

    <h3>Trade Log</h3>
    <div class="table-wrap">
      <table id="tradeLog">
        <thead>
          <tr>
            <th>#</th><th>Entry</th><th>Exit</th>
            <th>Entry $</th><th>Exit $</th><th>Size</th>
            <th>P&amp;L</th><th>Return %</th><th>Days</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <h3>Analysis</h3>
    <div id="narrative" class="narrative"></div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
